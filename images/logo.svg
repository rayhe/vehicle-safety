<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle — dark gauge bezel -->
  <circle cx="256" cy="256" r="240" fill="url(#gaugeGrad)" stroke="#333" stroke-width="8"/>
  
  <!-- Inner gauge ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#444" stroke-width="2"/>
  
  <!-- Gauge arc — safe zone (gray) from ~210° to ~330° -->
  <path d="M 106 366 A 190 190 0 0 1 256 66" fill="none" stroke="#555" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Gauge arc — warning zone (orange) -->
  <path d="M 256 66 A 190 190 0 0 1 380 105" fill="none" stroke="#FF9800" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Gauge arc — danger/red zone -->
  <path d="M 380 105 A 190 190 0 0 1 406 366" fill="none" stroke="url(#redGlow)" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Tick marks around the gauge -->
  <!-- Major ticks -->
  <g stroke="#888" stroke-width="3">
    <line x1="116" y1="356" x2="136" y2="340" />
    <line x1="82" y1="270" x2="108" y2="270" />
    <line x1="116" y1="180" x2="136" y2="196" />
    <line x1="186" y1="110" x2="198" y2="130" />
    <line x1="270" y1="76" x2="270" y2="100" />
  </g>
  <!-- Red zone ticks -->
  <g stroke="#D32F2F" stroke-width="3">
    <line x1="356" y1="100" x2="344" y2="120" />
    <line x1="410" y1="170" x2="390" y2="182" />
    <line x1="430" y1="256" x2="406" y2="256" />
    <line x1="410" y1="340" x2="390" y2="328" />
  </g>
  
  <!-- Needle — pointing deep into the red zone (~40° from right) -->
  <g transform="rotate(55, 256, 256)">
    <polygon points="256,90 248,256 264,256" fill="url(#needleGrad)"/>
    <!-- Needle shadow -->
    <polygon points="256,90 248,256 264,256" fill="rgba(0,0,0,0.2)" transform="translate(3,3)"/>
  </g>
  
  <!-- Center hub -->
  <circle cx="256" cy="256" r="22" fill="#333" stroke="#555" stroke-width="3"/>
  <circle cx="256" cy="256" r="10" fill="#D32F2F"/>
  
  <!-- "CR" text at bottom of gauge -->
  <text x="256" y="380" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="6" fill="#E0E0E0">CR</text>
  
  <!-- Small "THE CRASH REPORT" arc text approximation — just subtle dots as scale markers -->
  <text x="256" y="430" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" letter-spacing="3" fill="#666" text-transform="uppercase">THE CRASH REPORT</text>
</svg>
