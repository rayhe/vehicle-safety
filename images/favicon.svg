<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>
  <!-- Dark circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Safe arc -->
  <path d="M 13 46 A 24 24 0 0 1 32 8" fill="none" stroke="#555" stroke-width="5" stroke-linecap="round"/>
  <!-- Warning arc -->
  <path d="M 32 8 A 24 24 0 0 1 47 13" fill="none" stroke="#FF9800" stroke-width="5" stroke-linecap="round"/>
  <!-- Red arc -->
  <path d="M 47 13 A 24 24 0 0 1 51 46" fill="none" stroke="url(#rg)" stroke-width="5" stroke-linecap="round"/>
  <!-- Needle into red zone -->
  <g transform="rotate(55, 32, 32)">
    <polygon points="32,11 30,32 34,32" fill="#D32F2F"/>
  </g>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="4" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="32" cy="32" r="2" fill="#D32F2F"/>
</svg>
