name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage deploy files
        run: |
          mkdir -p deploy/stories deploy/images
          cp index.html charts.js style.css fars_output.js deploy/
          [ -f export-csv.js ] && cp export-csv.js deploy/ || true
          [ -f newsletter.js ] && cp newsletter.js deploy/ || true
          [ -f story-search.js ] && cp story-search.js deploy/ || true
          [ -f story-filters.js ] && cp story-filters.js deploy/ || true
          [ -f reading-progress.js ] && cp reading-progress.js deploy/ || true
          [ -f related-stories.js ] && cp related-stories.js deploy/ || true
          [ -f share-buttons.js ] && cp share-buttons.js deploy/ || true
          [ -f story-links.js ] && cp story-links.js deploy/ || true
          [ -f load-more.js ] && cp load-more.js deploy/ || true
          [ -f automaker-grades.js ] && cp automaker-grades.js deploy/ || true
          [ -f scatter-plot.js ] && cp scatter-plot.js deploy/ || true
          [ -f story-nav.js ] && cp story-nav.js deploy/ || true
          [ -f favicon.ico ] && cp favicon.ico deploy/ || true
          [ -f sitemap.xml ] && cp sitemap.xml deploy/ || true
          cp stories/*.html deploy/stories/
          [ -d images ] && cp images/* deploy/images/ || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy/ --project-name=vehicle-safety
